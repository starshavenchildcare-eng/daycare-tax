<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daycare Tax Tracker</title>
  <script>
    const manifest = {
      name: "Daycare Tax",
      short_name: "TaxDaycare",
      start_url: ".",
      display: "standalone",
      background_color: "#ffffff",
      theme_color: "#4CAF50",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234CAF50'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E🧾%3C/text%3E%3C/svg%3E",
        sizes: "100x100",
        type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    document.querySelector('link[rel="manifest"]')?.remove();
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
      background: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 15px 20px;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
    }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      -webkit-overflow-scrolling: touch;
    }
    nav {
      display: flex;
      border-top: 1px solid #ddd;
      background: #fafafa;
    }
    nav button {
      flex: 1;
      padding: 12px 5px;
      background: none;
      border: none;
      font-size: 0.9em;
      color: #666;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    nav button.active { color: #4CAF50; font-weight: 600; }
    .page { display: none; }
    .page.active { display: block; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #4CAF50;
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    button:disabled { background: #aaa; }
    .row { display: flex; gap: 8px; align-items: center; }
    .col { flex: 1; }
    .image-preview { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    .expense-line { display: flex; justify-content: space-between; margin: 8px 0; }
    .total { font-size: 1.2em; font-weight: bold; margin-top: 15px; }
    .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .login-container .card { width: 100%; max-width: 320px; }
    .error { color: #d32f2f; font-size: 0.9em; margin-top: 5px; }

    .item-row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
    .item-row input { width: auto; flex: 1; margin: 0; }
    .item-row .item-name { flex: 3; }
    .item-row .item-amount { flex: 1.5; }
    .item-row .toggle-btn {
      width: auto; padding: 6px 12px; font-size: 0.8em;
      border-radius: 15px; margin: 0; background: #4CAF50;
    }
    .item-row .toggle-btn.exempt { background: #f44336; }
    .subtotal-row { display: flex; justify-content: space-between; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="app-container" id="app">
    <!-- Login screen -->
    <div id="loginPage" class="page active">
      <div class="login-container">
        <div class="card">
          <h2 style="text-align:center;">Daycare Tax</h2>
          <p style="text-align:center;margin:15px 0;">Sign in to sync receipts</p>
          <input type="email" id="email" placeholder="Email" autocomplete="email">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
          <button id="loginBtn">Log In</button>
          <button id="signupBtn" style="background:#2196F3;">Create Account</button>
          <div id="authError" class="error"></div>
        </div>
      </div>
    </div>

    <!-- Main app -->
    <div id="mainApp" style="display:none; flex-direction: column; height: 100%;">
      <header>🧾 Daycare Tax Tracker</header>
      <main>
        <!-- Scan Page -->
        <div id="scanPage" class="page active">
          <div class="card">
            <h3>Scan a Receipt</h3>
            <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
            <button onclick="document.getElementById('fileInput').click()">📷 Camera / Gallery</button>
            <div id="previewContainer" style="display:none;">
              <img id="preview" class="image-preview">
              <div id="ocrStatus" style="margin:8px 0; font-size:0.9em;"></div>
            </div>
            <div id="manualForm" style="display:none;">
              <h4>Items</h4>
              <p style="font-size:0.8em;color:#666;">Add each item from the receipt. Tap "Exempt" for non‑daycare items.</p>
              <div id="itemsContainer"></div>
              <button id="addItemBtn" style="background:#2196F3;">+ Add Item</button>
              <div class="subtotal-row">
                <span>Taxable subtotal:</span>
                <span id="itemSubtotal">$0.00</span>
              </div>
              <input id="vendorName" placeholder="Vendor (e.g. Costco)">
              <input id="receiptDate" type="date">
              <select id="category">
                <option value="">Select category</option>
                <option>Food & groceries</option>
                <option>Supplies (crafts, toys, cleaning)</option>
                <option>Advertising</option>
                <option>Insurance</option>
                <option>Maintenance & repairs</option>
                <option>Office expenses</option>
                <option>Utilities (business portion)</option>
                <option>Property taxes (business portion)</option>
                <option>Mortgage interest (business portion)</option>
                <option>Rent (business portion)</option>
                <option>Other business expenses</option>
              </select>
              <button id="saveReceiptBtn">Save Receipt</button>
            </div>
          </div>
        </div>

        <!-- Receipts List Page -->
        <div id="listPage" class="page">
          <h3>All Receipts</h3>
          <div id="receiptsList">Loading...</div>
        </div>

        <!-- Tax Summary Page -->
        <div id="summaryPage" class="page">
          <div class="card">
            <h3>Tax Year Summary (T2125)</h3>
            <div id="taxLines"></div>
            <div class="total" id="totalExpenses">Total: $0.00</div>
            <button id="exportPdfBtn">📄 Export PDF Report</button>
          </div>
          <div class="card">
            <h4>Business-Use-of-Home (optional)</h4>
            <label>Business use % <input id="homePercent" type="number" value="0" min="0" max="100"></label>
            <div class="row">
              <input id="homeRent" type="number" step="0.01" placeholder="Annual rent" class="col">
              <input id="homeUtilities" type="number" step="0.01" placeholder="Utilities" class="col">
            </div>
            <div class="row">
              <input id="homePropTax" type="number" step="0.01" placeholder="Property tax" class="col">
              <input id="homeMortgage" type="number" step="0.01" placeholder="Mortgage interest" class="col">
            </div>
            <input id="homeMaintenance" type="number" step="0.01" placeholder="Maintenance/repairs">
            <button id="saveHomeSettings">Save Home Settings</button>
          </div>
        </div>

        <!-- Settings Page -->
        <div id="settingsPage" class="page">
          <div class="card">
            <h3>Account</h3>
            <p id="userEmail"></p>
            <button id="logoutBtn" style="background:#f44336;">Log Out</button>
          </div>
        </div>
      </main>

      <nav>
        <button id="navScan" class="active" data-page="scanPage">📸 Scan</button>
        <button id="navList" data-page="listPage">📋 Receipts</button>
        <button id="navSummary" data-page="summaryPage">📊 Tax</button>
        <button id="navSettings" data-page="settingsPage">⚙️ Settings</button>
      </nav>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"
      }
    }
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, doc, setDoc, getDoc } from 'firebase/firestore';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'firebase/storage';

    // ========== KEYS ==========
    const firebaseConfig = {
      apiKey: "AIzaSyA2cWoeS_7fqu6Efvyns81-HFOfxBSlSBE",
      authDomain: "tax-filling-app.firebaseapp.com",
      projectId: "tax-filling-app",
      storageBucket: "tax-filling-app.firebasestorage.app",
      messagingSenderId: "955905005135",
      appId: "1:955905005135:web:164f865d4441285d0b7c3a",
      measurementId: "G-0LRKFHGD4Z"
    };
    const OCR_SPACE_KEY = "K88515435188957"; // your existing free key

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let receipts = [];
    let homeSettings = { percent: 0, rent: 0, utilities: 0, propTax: 0, mortgage: 0, maintenance: 0 };
    let scannedItems = []; // [{name, amount, exempt: false}]

    // UI
    const loginPage = document.getElementById('loginPage');
    const mainApp = document.getElementById('mainApp');
    const authError = document.getElementById('authError');
    const userEmailSpan = document.getElementById('userEmail');
    const pages = document.querySelectorAll('.page');
    const navButtons = document.querySelectorAll('nav button');

    function showPage(id) {
      pages.forEach(p => p.classList.remove('active'));
      document.getElementById(id)?.classList.add('active');
      navButtons.forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-page="${id}"]`)?.classList.add('active');
    }
    navButtons.forEach(b => b.addEventListener('click', () => showPage(b.dataset.page)));

    // Auth
    document.getElementById('loginBtn').addEventListener('click', async () => {
      try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); }
      catch(e) { authError.textContent = e.message; }
    });
    document.getElementById('signupBtn').addEventListener('click', async () => {
      try { await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); }
      catch(e) { authError.textContent = e.message; }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        loginPage.style.display = 'none';
        mainApp.style.display = 'flex';
        userEmailSpan.textContent = user.email;
        loadReceipts();
        loadHomeSettings();
      } else {
        loginPage.style.display = 'flex';
        mainApp.style.display = 'none';
      }
    });

    function loadReceipts() {
      if (!currentUser) return;
      const q = query(collection(db, 'receipts'), where('userId', '==', currentUser.uid), orderBy('createdAt', 'desc'));
      onSnapshot(q, snapshot => {
        receipts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderReceiptsList();
        renderTaxSummary();
      });
    }

    async function loadHomeSettings() {
      if (!currentUser) return;
      const snap = await getDoc(doc(db, 'settings', currentUser.uid));
      if (snap.exists()) {
        homeSettings = snap.data();
        document.getElementById('homePercent').value = homeSettings.percent || 0;
        document.getElementById('homeRent').value = homeSettings.rent || 0;
        document.getElementById('homeUtilities').value = homeSettings.utilities || 0;
        document.getElementById('homePropTax').value = homeSettings.propTax || 0;
        document.getElementById('homeMortgage').value = homeSettings.mortgage || 0;
        document.getElementById('homeMaintenance').value = homeSettings.maintenance || 0;
      }
    }

    async function saveHomeSettings() {
      homeSettings = {
        percent: +document.getElementById('homePercent').value,
        rent: +document.getElementById('homeRent').value,
        utilities: +document.getElementById('homeUtilities').value,
        propTax: +document.getElementById('homePropTax').value,
        mortgage: +document.getElementById('homeMortgage').value,
        maintenance: +document.getElementById('homeMaintenance').value,
      };
      if (currentUser) { await setDoc(doc(db, 'settings', currentUser.uid), homeSettings); alert('Saved!'); renderTaxSummary(); }
    }
    document.getElementById('saveHomeSettings').addEventListener('click', saveHomeSettings);

    function renderReceiptsList() {
      const c = document.getElementById('receiptsList');
      if (receipts.length === 0) { c.innerHTML = '<p>No receipts yet.</p>'; return; }
      c.innerHTML = receipts.map(r => {
        const taxable = r.taxableAmount ?? r.amount ?? 0;
        const itemsHtml = r.items?.length ? `<div style="font-size:0.75em;color:#888;">${r.items.filter(i=>!i.exempt).map(i=>i.name).join(', ') || 'No items'}</div>` : '';
        return `<div class="card" style="padding:12px;">
          <div style="display:flex;justify-content:space-between;"><strong>${r.vendor||'?'}</strong><span>$${taxable.toFixed(2)}</span></div>
          <div style="font-size:0.8em;color:#666;">${r.date} – ${r.category||''}</div>
          ${itemsHtml}
          ${r.imageUrl?`<img src="${r.imageUrl}" style="max-height:80px;width:100%;object-fit:contain;">`:''}
        </div>`;
      }).join('');
    }

    // T2125
    const CATEGORY_LINES = {
      'Food & groceries': '8523', 'Supplies (crafts, toys, cleaning)': '8523',
      'Advertising': '8521', 'Insurance': '8690', 'Maintenance & repairs': '8710',
      'Office expenses': '8871', 'Utilities (business portion)': '9180',
      'Property taxes (business portion)': '9200', 'Mortgage interest (business portion)': '9220',
      'Rent (business portion)': '9220', 'Other business expenses': '9270'
    };

    function calculateTaxLines() {
      const lines = {};
      receipts.forEach(r => {
        const line = CATEGORY_LINES[r.category] || '9270';
        const taxable = r.taxableAmount ?? r.amount ?? 0;
        lines[line] = (lines[line]||0) + taxable;
      });
      if (homeSettings.percent > 0) {
        const p = homeSettings.percent/100;
        lines['9220'] = (lines['9220']||0) + (homeSettings.rent||0)*p + (homeSettings.mortgage||0)*p;
        lines['9180'] = (lines['9180']||0) + (homeSettings.utilities||0)*p;
        lines['9200'] = (lines['9200']||0) + (homeSettings.propTax||0)*p;
        lines['8710'] = (lines['8710']||0) + (homeSettings.maintenance||0)*p;
      }
      return lines;
    }

    function renderTaxSummary() {
      const lines = calculateTaxLines();
      const total = Object.values(lines).reduce((a,b)=>a+b,0);
      const names = {'8521':'Advertising','8523':'Supplies','8690':'Insurance','8710':'Maintenance','8871':'Office','9180':'Utilities','9200':'Property taxes','9220':'Rent/Mortgage','9270':'Other'};
      document.getElementById('taxLines').innerHTML = Object.keys(lines).map(l=>`<div class="expense-line"><span>Line ${l} – ${names[l]}</span><span>$${lines[l].toFixed(2)}</span></div>`).join('');
      document.getElementById('totalExpenses').textContent = `Total: $${total.toFixed(2)}`;
    }

    // PDF
    async function exportPDF() {
      const { default: jsPDF } = await import('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.es.min.js');
      const doc = new jsPDF();
      const lines = calculateTaxLines();
      const total = Object.values(lines).reduce((a,b)=>a+b,0);
      doc.setFontSize(16); doc.text('Daycare Expense Report (T2125)',20,20);
      doc.setFontSize(12); let y=35;
      const names={'8521':'Adv','8523':'Supplies','8690':'Insurance','8710':'Maint','8871':'Office','9180':'Utilities','9200':'PropTax','9220':'Rent/Mort','9270':'Other'};
      Object.keys(lines).forEach(l=>{ doc.text(`Line ${l}: $${lines[l].toFixed(2)}`,20,y); y+=7; });
      doc.text(`Total: $${total.toFixed(2)}`,20,y+5);
      doc.save('DaycareTaxReport.pdf');
    }
    document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);

    // ========== Manual Item Entry ==========
    const itemsContainer = document.getElementById('itemsContainer');
    const itemSubtotal = document.getElementById('itemSubtotal');
    const addItemBtn = document.getElementById('addItemBtn');

    function addItemRow(item = { name: '', amount: 0, exempt: false }) {
      const div = document.createElement('div');
      div.className = 'item-row';
      div.innerHTML = `
        <input class="item-name" placeholder="Item" value="${item.name}">
        <input class="item-amount" type="number" step="0.01" placeholder="Price" value="${item.amount || ''}">
        <button class="toggle-btn ${item.exempt ? 'exempt' : ''}">${item.exempt ? 'Exempt' : 'Include'}</button>
      `;
      const nameInp = div.querySelector('.item-name');
      const amountInp = div.querySelector('.item-amount');
      const toggleBtn = div.querySelector('.toggle-btn');

      toggleBtn.addEventListener('click', () => {
        const exempt = toggleBtn.classList.toggle('exempt');
        toggleBtn.textContent = exempt ? 'Exempt' : 'Include';
        updateSubtotal();
      });

      nameInp.addEventListener('input', updateSubtotal);
      amountInp.addEventListener('input', updateSubtotal);

      itemsContainer.appendChild(div);
      updateSubtotal();
    }

    function getItems() {
      return Array.from(itemsContainer.children).map(row => ({
        name: row.querySelector('.item-name').value || 'Item',
        amount: parseFloat(row.querySelector('.item-amount').value) || 0,
        exempt: row.querySelector('.toggle-btn').classList.contains('exempt')
      }));
    }

    function updateSubtotal() {
      const items = getItems();
      const taxable = items.filter(i => !i.exempt).reduce((s, i) => s + i.amount, 0);
      itemSubtotal.textContent = `$${taxable.toFixed(2)}`;
    }

    addItemBtn.addEventListener('click', () => addItemRow());

    // OCR.space integration
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('preview');
    const previewContainer = document.getElementById('previewContainer');
    const manualForm = document.getElementById('manualForm');
    const ocrStatus = document.getElementById('ocrStatus');

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        previewImg.src = ev.target.result;
        previewContainer.style.display = 'block';
        manualForm.style.display = 'none';
        itemsContainer.innerHTML = '';
      };
      reader.readAsDataURL(file);
      ocrStatus.textContent = 'Scanning...';

      try {
        const base64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(',')[1]);
          r.onerror = rej;
          r.readAsDataURL(file);
        });

        const fd = new FormData();
        fd.append('base64Image', `data:image/jpeg;base64,${base64}`);
        fd.append('language', 'eng');
        fd.append('isOverlayRequired', 'false');
        fd.append('filetype', 'JPG');
        fd.append('OCREngine', '2');

        const resp = await fetch('https://api.ocr.space/parse/image', {
          method: 'POST',
          headers: { apikey: OCR_SPACE_KEY },
          body: fd
        });
        const data = await resp.json();
        if (data.OCRExitCode !== 1 || !data.ParsedResults?.length) throw new Error('OCR failed');

        const text = data.ParsedResults[0].ParsedText;
        const lines = text.split('\n').filter(l => l.trim());
        // Vendor guess: first non-numeric line
        let vendorGuess = 'Unknown';
        for (const line of lines) {
          if (line.length > 3 && !/^\d/.test(line) && !/\d{1,2}[\/\-\.]\d{1,2}/.test(line)) {
            vendorGuess = line.substring(0,30);
            break;
          }
        }
        document.getElementById('vendorName').value = vendorGuess;

        // Auto-add items from lines that look like prices
        const priceLineRegex = /\$?\s?(\d+\.\d{2})/;
        let added = 0;
        lines.forEach(line => {
          const m = line.match(priceLineRegex);
          if (m) {
            const amount = parseFloat(m[1]);
            if (amount > 0) {
              const name = line.replace(priceLineRegex, '').trim() || 'Item';
              addItemRow({ name, amount, exempt: false });
              added++;
            }
          }
        });
        if (added === 0) addItemRow(); // at least one empty row

        ocrStatus.textContent = `Found ${added} items. Adjust as needed.`;
        manualForm.style.display = 'block';
      } catch (err) {
        console.error(err);
        ocrStatus.textContent = 'OCR failed. Enter items manually.';
        if (itemsContainer.children.length === 0) addItemRow();
        manualForm.style.display = 'block';
      }
    });

    // Save
    document.getElementById('saveReceiptBtn').addEventListener('click', async () => {
      if (!currentUser) return;
      const vendor = document.getElementById('vendorName').value || 'Unknown';
      const date = document.getElementById('receiptDate').value || new Date().toISOString().slice(0,10);
      const category = document.getElementById('category').value;
      if (!category) { alert('Select a category'); return; }
      const imageFile = fileInput.files[0];
      if (!imageFile) { alert('No image selected'); return; }

      const items = getItems();
      const taxableAmount = items.filter(i => !i.exempt).reduce((s,i) => s + i.amount, 0);
      const totalAmount = items.reduce((s,i) => s + i.amount, 0);

      const docRef = await addDoc(collection(db, 'receipts'), {
        userId: currentUser.uid,
        vendor, date, category,
        amount: totalAmount,
        taxableAmount,
        items,
        imageUrl: '',
        createdAt: new Date()
      });
      const storageRef = ref(storage, `receipt-images/${currentUser.uid}/${docRef.id}.jpg`);
      await uploadBytes(storageRef, imageFile);
      const url = await getDownloadURL(storageRef);
      await setDoc(doc(db, 'receipts', docRef.id), { imageUrl: url }, { merge: true });

      alert('Saved!');
      fileInput.value = '';
      previewContainer.style.display = 'none';
      manualForm.style.display = 'none';
      itemsContainer.innerHTML = '';
      document.getElementById('vendorName').value = '';
      document.getElementById('receiptDate').value = '';
      document.getElementById('category').value = '';
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('fetch', e => {});`], {type: 'application/javascript'})));
      });
    }
  </script>
</body>
</html>
